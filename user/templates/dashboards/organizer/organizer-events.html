{% extends "../organizer-dashboard.html" %}
{% block title %}Organizer Events{% endblock title %}
{% block organizer_content %}
<div class="flex flex-col justify-start p-4">
    <div class="flex p-4">
        <input id="search-input" type="text" name="search" placeholder="Search by event name" class="w-full bg-slate-700/50 text-slate-100 px-4 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500">
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 p-4">
        <div class="col-span-full flex justify-center items-center hover:bg-slate-700/50 bg-slate-800/50 backdrop-blur-lg p-4 rounded-xl border border-slate-700/40 text-slate-100 transition-colors cursor-pointer">
            <p id="total_events" class="font-bold text-center text-2xl text-slate-100">Total Events: 0</p>
        </div>
    </div>
</div>
{% endblock %}
